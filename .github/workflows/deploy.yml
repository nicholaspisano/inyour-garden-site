name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -X GET \
            "http://157.230.6.81:8000/api/v1/deploy?uuid=xi5l3sw8yisq66u5eoeyxga7&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
